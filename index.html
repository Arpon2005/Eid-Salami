<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Salami Spin Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  text-align: center;
}

.wheel {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  border: 6px solid gold;
  position: relative;
  overflow: hidden;
  transition: transform 4s cubic-bezier(0.33,1,0.68,1);
  box-shadow: 0 0 30px rgba(255,215,0,0.5);
}

.segment {
  position: absolute;
  width: 50%;
  height: 50%;
  transform-origin: bottom right;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

button {
  margin-top: 30px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  font-weight: 600;
  background: gold;
  color: black;
  cursor: pointer;
  transition: 0.2s;
}

button:hover { transform: scale(1.05); }
button:active { transform: scale(0.95); }
button:disabled { background: gray; cursor: not-allowed; }

.result {
  margin-top: 20px;
  font-size: 20px;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
}

</style>
</head>
<body>

<div class="container">
  <h2>🌙 Eid Salami Wheel</h2>

  <div id="wheel" class="wheel"></div>

  <button id="spinBtn">Tap to Spin 🎯</button>

  <div class="result" id="result"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="modalText"></h2>
    <button onclick="shareResult()">Share Result</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const values = [1,2,2.5,3,3.5,4,5,6,7.5,10,12,15];
const wheel = document.getElementById('wheel');
const btn = document.getElementById('spinBtn');
const resultDiv = document.getElementById('result');
const modal = document.getElementById('modal');
const modalText = document.getElementById('modalText');

let rotation = 0;
let alreadySpun = localStorage.getItem('spinDone');

if(alreadySpun){
  btn.disabled = true;
  btn.innerText = "You already spun!";
}

// create segments
values.forEach((v,i)=>{
  const div = document.createElement('div');
  div.className = 'segment';
  div.style.transform = `rotate(${i*30}deg) skewY(-60deg)`;
  div.style.background = i%2===0 ? '#FFD70033' : '#ffffff22';
  div.innerHTML = `<span style="transform:skewY(60deg)">${v} Tk</span>`;
  wheel.appendChild(div);
});

function weightedRandom(){
  const pool = [
    ...Array(10).fill(1),
    ...Array(9).fill(2),
    ...Array(8).fill(2.5),
    ...Array(7).fill(3),
    ...Array(6).fill(3.5),
    ...Array(5).fill(4),
    ...Array(4).fill(5),
    ...Array(3).fill(6),
    ...Array(2).fill(7.5),
    10,12,15
  ];
  return pool[Math.floor(Math.random()*pool.length)];
}

btn.onclick = ()=>{
  if(alreadySpun) return;

  const value = weightedRandom();
  const index = values.indexOf(value);

  rotation += 360*5 + index*30;
  wheel.style.transform = `rotate(${rotation}deg)`;

  navigator.vibrate?.(200);

  setTimeout(()=>{
    resultDiv.innerText = `🎉 You got ${value} Tk Salami!`;
    modalText.innerText = `🎉 You got ${value} Tk Salami!`;
    modal.style.display = 'flex';

    localStorage.setItem('spinDone',true);
    localStorage.setItem('value',value);

    btn.disabled = true;
    btn.innerText = "You already spun!";

  },4000);
};

function closeModal(){
  modal.style.display='none';
}

function shareResult(){
  const value = localStorage.getItem('value');
  const text = `I just got ${value} Tk Eid Salami! Try yours 🎉`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

</script>

</body>
</html>
